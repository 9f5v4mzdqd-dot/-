<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>12色のセルフ・カラーセラピー</title>
    <style>
        :root { --bg-color: #f8f9fa; --text-color: #333; }
        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; transition: background-color 0.6s, color 0.6s;
        }
        .container { width: 100%; max-width: 500px; text-align: center; }
        h1 { font-size: 1.4rem; margin-top: 20px; }
        .step-text { font-size: 1rem; margin-bottom: 20px; color: #555; }

        /* 12色のグリッド */
        .color-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 12px; margin-bottom: 30px;
        }
        .color-btn {
            aspect-ratio: 1; border: none; border-radius: 50%;
            cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        .color-btn:active { transform: scale(0.9); }

        /* 理由入力エリア */
        #input-section { display: none; margin-top: 20px; }
        textarea {
            width: 90%; height: 100px; padding: 15px;
            border-radius: 15px; border: 1px solid #ccc;
            font-size: 1rem; margin-bottom: 15px; resize: none;
        }
        .primary-btn {
            background: #333; color: white; border: none;
            padding: 12px 30px; border-radius: 25px; font-size: 1rem;
        }

        /* 結果表示エリア */
        #result-section {
            display: none; padding: 30px 20px; border-radius: 25px;
            background: rgba(255,255,255,0.92); box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 20px; color: #333 !important;
        }
        .user-note {
            font-style: italic; margin: 15px 0; padding: 10px;
            border-left: 3px solid #ccc; background: #f0f0f0; text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="step1">
        <h1>今のあなたの気になる色は？</h1>
        <p class="step-text">直感で1つ選んでください</p>
        <div class="color-grid" id="grid"></div>
    </div>

    <div id="input-section">
        <h1 id="selected-color-title"></h1>
        <p class="step-text">なぜその色が気になりましたか？<br>今の気持ちを自由に書いてみましょう。</p>
        <textarea id="reason-input" placeholder="例：なんとなく落ち着くから、最近疲れ気味で…など"></textarea>
        <br>
        <button class="primary-btn" onclick="showFinalResult()">診断結果を見る</button>
    </div>

    <div id="result-section">
        <h2 id="res-name"></h2>
        <div class="user-note" id="res-user-reason"></div>
        <p id="res-message" style="line-height: 1.6;"></p>
        <button class="primary-btn" style="margin-top:20px;" onclick="location.reload()">最初に戻る</button>
    </div>
</div>

<script>
    const colors = [
        { id:'red', code:'#FF0000', name:'レッド', msg:'情熱、活力、行動力。エネルギーが必要な時や、前向きに進みたい時に惹かれます。' },
        { id:'blue', code:'#0000FF', name:'ブルー', msg:'冷静、安らぎ、誠実。心を落ち着かせたい時や、自分を見つめ直したい時に惹かれます。' },
        { id:'yellow', code:'#FFFF00', name:'イエロー', msg:'希望、喜び、好奇心。新しい刺激が欲しい時や、明るい気分になりたい時に惹かれます。' },
        { id:'green', code:'#008000', name:'グリーン', msg:'癒やし、調和、リフレッシュ。安心感が欲しい時や、バランスを整えたい時に惹かれます。' },
        { id:'orange', code:'#FFA500', name:'オレンジ', msg:'社交性、温かさ、喜び。元気が欲しい時や、人との繋がりを感じたい時に惹かれます。' },
        { id:'purple', code:'#800080', name:'パープル', msg:'直感、感性、精神性。自分を癒やしたい時や、想像力を高めたい時に惹かれます。' },
        { id:'pink', code:'#FFC0CB', name:'ピンク', msg:'愛、優しさ、幸福感。自分を慈しみたい時や、穏やかな気持ちになりたい時に惹かれます。' },
        { id:'turquoise', code:'#40E0D0', name:'ターコイズ', msg:'創造性、変化、自由。自分の個性を表現したい時や、新しい道を探したい時に惹かれます。' },
        { id:'magenta', code:'#FF00FF', name:'マゼンタ', msg:'慈愛、献身、満足感。日常の幸せに気づきたい時や、周囲を大切にしたい時に惹かれます。' },
        { id:'white', code:'#FFFFFF', name:'ホワイト', msg:'リセット、純粋、可能性。何かを新しく始めたい時や、心を浄化したい時に惹かれます。' },
        { id:'black', code:'#000000', name:'ブラック', msg:'意思、守護、静寂。強い決意がある時や、自分の世界を守りたい時に惹かれます。' },
        { id:'gold', code:'#D4AF37', name:'ゴールド', msg:'価値、成功、自信。自分の可能性を認めたい時や、豊かさを感じたい時に惹かれます。' }
    ];

    let selectedColor = null;

    // 12色のボタンを作成
    const grid = document.getElementById('grid');
    colors.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'color-btn';
        btn.style.backgroundColor = c.code;
        btn.onclick = () => selectColor(c);
        grid.appendChild(btn);
    });

    function selectColor(color) {
        selectedColor = color;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('input-section').style.display = 'block';
        document.getElementById('selected-color-title').innerText = `選んだ色：${color.name}`;
    }

    function showFinalResult() {
        const reason = document.getElementById('reason-input').value || "（理由は記入されませんでした）";
        
        document.body.style.backgroundColor = selectedColor.code;
        // 背景が黒や暗い色の時の文字色調整
        if(['black', 'blue', 'purple', 'green'].includes(selectedColor.id)) {
            document.body.style.color = "white";
        }

        document.getElementById('input-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        
        document.getElementById('res-name').innerText = selectedColor.name;
        document.getElementById('res-user-reason').innerText = `あなたの感じた理由：\n${reason}`;
        document.getElementById('res-message').innerText = selectedColor.msg;
    }
</script>
</body>
</html>
