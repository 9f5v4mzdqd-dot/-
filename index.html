<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心に寄り添う 24色のカラーセラピー</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            
            /* --- ホワイトウッド背景の確実な設定 --- */
            background-image: url('https://images.unsplash.com/photo-1516048015710-7a3b4c86be43?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #f5f5f5; /* 画像読み込みまでの予備色 */
            /* ------------------------------------- */

            color: #5d5045;
            transition: background-color 1.2s ease;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.85);
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            backdrop-filter: blur(6px);
            box-sizing: border-box;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.5);
        }

        h1 { font-size: 1.3rem; color: #8b7355; margin-bottom: 20px; }
        
        .fade-in { animation: fadeIn 1s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .color-btn {
            aspect-ratio: 1;
            border: 3px solid white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .color-btn:active { transform: scale(0.85); }

        textarea {
            width: 100%;
            height: 140px;
            padding: 15px;
            border-radius: 25px;
            border: 2px solid #efedea;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
            background: rgba(255,255,255,0.7);
        }

        .primary-btn {
            background: #b8a28a;
            color: white;
            border: none;
            padding: 14px 45px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 6px 15px rgba(184, 162, 138, 0.3);
        }

        .calendar-container {
            margin-top: 40px;
            border-top: 1px solid #e8e3de;
            padding-top: 25px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-top: 15px;
        }
        .cal-day {
            font-size: 0.7rem;
            padding: 8px 0;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            min-height: 42px;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .cal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin: 4px auto 0;
            display: block;
            border: 2px solid white;
        }

        .meaning-box {
            text-align: left;
            background: rgba(255,255,255,0.9);
            padding: 25px;
            border-radius: 30px;
            margin: 20px 0;
            line-height: 1.8;
        }
        .label { font-weight: bold; font-size: 0.85rem; display: block; margin-bottom: 4px; }
        .pos { color: #b5834a; }
        .neg { color: #7a8a99; }
        #res-memo { font-size: 0.95rem; color: #6d5d4b; white-space: pre-wrap; margin-top: 5px; }

        #input-section, #result-section { display: none; }
    </style>
</head>
<body>

<div class="container fade-in" id="app">
    <div id="step1">
        <h1>今の気分は何色？</h1>
        <div class="color-grid" id="grid"></div>
        <div class="calendar-container">
            <h3 id="calendar-title" style="font-size:0.9rem; color:#a68b6d;"></h3>
            <div class="calendar-grid" id="calendar"></div>
        </div>
    </div>

    <div id="input-section" class="fade-in">
        <h1 id="selected-title"></h1>
        <textarea id="reason-input" placeholder="今の素直な気持ちを、ゆっくり書いてみてください..."></textarea>
        <button class="primary-btn" onclick="saveAndShow()">この気持ちを大切に守る</button>
    </div>

    <div id="result-section" class="fade-in">
        <h2 id="res-name" style="margin-bottom:0;"></h2>
        <div class="meaning-box">
            <div><span class="label pos">● 良い状態のとき</span><span id="res-pos"></span></div>
            <div style="margin-top:18px;"><span class="label neg">● 気をつけたいとき</span><span id="res-neg"></span></div>
            <hr style="border:0; border-top:1px dashed #e8e3de; margin:20px 0;">
            <div><span class="label" style="color:#b8a28a;">● 心のメモ</span><p id="res-memo"></p></div>
        </div>
        <button class="primary-btn" onclick="location.reload()">カレンダーに戻る</button>
    </div>
</div>

<script>
    const colors = [
        { id:'red', code:'#FF6B6B', name:'レッド', pos:'情熱的で、一歩踏み出すエネルギーに満ちています。', neg:'少し怒りっぽかったり、焦りを感じているかも。' },
        { id:'blue', code:'#74B9FF', name:'ブルー', pos:'心が静かで、誠実な気持ちで物事を見つめています。', neg:'孤独感があったり、感情を抑え込んでいるかもしれません。' },
        { id:'yellow', code:'#FFE66D', name:'イエロー', pos:'明るく前向きで、新しいことへの好奇心が高まっています。', neg:'考えがまとまらず、少し不安を感じやすい状態かも。' },
        { id:'green', code:'#86E3CE', name:'グリーン', pos:'心身のバランスが良く、穏やかな癒やしを感じています。', neg:'保守的になりすぎて、変化を避けているかもしれません。' },
        { id:'orange', code:'#FFBE76', name:'オレンジ', pos:'人との交流を楽しめ、温かい気持ちで過ごせています。', neg:'寂しさから、誰かに頼りたくなっているかもしれません。' },
        { id:'purple', code:'#D6A2E8', name:'パープル', pos:'直感が鋭く、精神的な豊かさを感じられるとき。', neg:'現実の厳しさから、少し離れたいと感じているかも。' },
        { id:'pink', code:'#FFB8B8', name:'ピンク', pos:'優しさに溢れ、自分や周囲を愛せる穏やかな状態。', neg:'誰かに甘えたかったり、傷つきやすくなっているかも。' },
        { id:'turquoise', code:'#81ECEC', name:'ターコイズ', pos:'自分らしい表現ができ、自由な心でいられます。', neg:'考えが複雑になり、心の内を整理したい時かも。' },
        { id:'magenta', code:'#F368E0', name:'マゼンタ', pos:'日常の小さな幸せに感謝し、満たされた心境です。', neg:'頑張りすぎて、少しケアが必要なサインかもしれません。' },
        { id:'white', code:'#FFFFFF', name:'ホワイト', pos:'心が清らかで、新しい始まりに向けた準備ができています。', neg:'真っさらすぎて、何をしていいか迷っている状態かも。' },
        { id:'black', code:'#576574', name:'ブラック', pos:'強い信念を持ち、自分の世界を大切に守っています。', neg:'プレッシャーを感じて、心を閉ざしたい気分かも。' },
        { id:'gold', code:'#E1B12C', name:'ゴールド', pos:'自分の価値を認め、自信と豊かさを感じています。', neg:'自分を強く見せようと、無理をしているかもしれません。' },
        { id:'lavender', code:'#E0D1F0', name:'ラベンダー', pos:'上品な安らぎの中にあり、感受性が高まっています。', neg:'少し神経過敏で、静かな休息を求めているかも。' },
        { id:'royal-blue', code:'#4834D4', name:'ロイヤルブルー', pos:'深い知恵と誠実さを持ち、本質を見抜けるとき。', neg:'厳格になりすぎて、自分や他人に厳しいかもしれません。' },
        { id:'lime', code:'#BAD63E', name:'ライム', pos:'新芽のような瑞々しさと、成長への期待があります。', neg:'新しい環境に対して、少し背伸びをしているかも。' },
        { id:'brown', code:'#967259', name:'ブラウン', pos:'大地のような安定感があり、落ち着いて過ごせています。', neg:'保守的になりすぎて、腰が重くなっているかもしれません。' },
        { id:'beige', code:'#E5D5C0', name:'ベージュ', pos:'肩の力が抜け、ありのままの自分を肯定できています。', neg:'少し退屈を感じていたり、活力を求めているかも。' },
        { id:'olive', code:'#A3CB38', name:'オリーブ', pos:'知恵、平和、粘り強さ。', neg:'責任感が強すぎて、少し荷が重いと感じているかも。' },
        { id:'sky', code:'#DFF9FB', name:'スカイブルー', pos:'解放、広い心、コミュニケーション。', neg:'現実から目を背け、自由を強く求めているかもしれません。' },
        { id:'emerald', code:'#2ECC71', name:'エメラルド', pos:'精神的な成長を感じ、豊かさを共有できる状態です。', neg:'理想を追いすぎて、現実とのギャップに悩むかも。' },
        { id:'peach', code:'#FFD3B6', name:'ピーチ', pos:'思いやりがあり、柔らかな人当たりで過ごせています。', neg:'他人の目が気になり、少し過敏になっているかも。' },
        { id:'ruby', code:'#EB4D4B', name:'ルビー', pos:'情熱的な愛と、カリスマ性を発揮できるパワフルな時。', neg:'感情の波が激しく、少しクールダウンが必要かも。' },
        { id:'navy', code:'#130F40', name:'ネイビー', pos:'信頼と規律を重んじ、冷静な判断ができるとき。', neg:'考えを固定しすぎて、融通が利かない状態かも。' },
        { id:'silver', code:'#CED6E0', name:'シルバー', pos:'洗練された感覚を持ち、静かな変化を受け入れています。', neg:'冷淡に物事を見てしまい、孤独を感じているかも。' }
    ];

    let selected = null;
    const today = new Date();
    const dateKey = `${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;

    const grid = document.getElementById('grid');
    colors.forEach(c => {
        const b = document.createElement('button');
        b.className = 'color-btn';
        b.style.backgroundColor = c.code;
        b.onclick = () => {
            selected = c;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('input-section').style.display = 'block';
            document.getElementById('selected-title').innerText = `${c.name}を選んだ理由`;
        };
        grid.appendChild(b);
    });

    function initCalendar() {
        const cal = document.getElementById('calendar');
        const history = JSON.parse(localStorage.getItem('colorLog') || '{}');
        const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
        document.getElementById('calendar-title').innerText = `${today.getFullYear()}年 ${today.getMonth()+1}月`;

        for (let i = 1; i <= daysInMonth; i++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'cal-day';
            dayDiv.innerText = i;
            const key = `${today.getFullYear()}-${today.getMonth()+1}-${i}`;
            if (history[key]) {
                const dot = document.createElement('span');
                dot.className = 'cal-dot';
                dot.style.backgroundColor = history[key].code;
                dayDiv.appendChild(dot);
            }
            cal.appendChild(dayDiv);
        }
    }

    function saveAndShow() {
        const memo = document.getElementById('reason-input').value;
        const history = JSON.parse(localStorage.getItem('colorLog') || '{}');
        history[dateKey] = { code: selected.code, name: selected.name, memo: memo, pos: selected.pos, neg: selected.neg };
        localStorage.setItem('colorLog', JSON.stringify(history));

        document.body.style.backgroundColor = selected.code;
        document.getElementById('input-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        document.getElementById('res-name').innerText = selected.name;
        document.getElementById('res-pos').innerText = selected.pos;
        document.getElementById('res-neg').innerText = selected.neg;
        document.getElementById('res-memo').innerText = memo || "（記入なし）";
    }

    initCalendar();
</script>
</body>
</html>
