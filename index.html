<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ココイロ — 感情の輪郭を、色でなぞる</title>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Zen+Maru+Gothic:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f4ef;
            --card: rgba(255,255,255,0.85);
            --ink: #5d5045;
            --ink-light: #8a7e75;
            --border: rgba(180,165,150,0.25);
            --accent: #c9a97a;
            --radius: 28px;
            --shadow: 0 8px 32px rgba(80,60,40,0.06);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 24px 16px 60px;
            display: flex;
            justify-content: center;
            background-image: 
                linear-gradient(rgba(255,255,255,0.5), rgba(255,255,255,0.5)), 
                url('https://images.unsplash.com/photo-1449247709967-d4461a6a6103?q=80&w=2071&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            letter-spacing: 0.03em;
        }

        .app { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 0; }
        .header { text-align: center; padding: 32px 0 24px; }
        .header-logo { font-family: 'Shippori Mincho', serif; font-size: 2.2rem; font-weight: 700; letter-spacing: 0.15em; }
        .header-sub { margin-top: 6px; font-size: 0.7rem; letter-spacing: 0.2em; color: var(--ink-light); font-weight: 500; }

        .card { background: var(--card); backdrop-filter: blur(14px); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); padding: 24px; margin-bottom: 16px; }
        .step { display: none; }
        .step.active { display: block; }

        .step-label { font-size: 0.65rem; letter-spacing: 0.15em; color: var(--ink-light); text-align: center; margin-bottom: 8px; font-weight: 700; }
        .title-m { font-family: 'Shippori Mincho', serif; font-size: 1.1rem; text-align: center; line-height: 1.8; margin-bottom: 22px; font-weight: 600; }

        .color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px; }
        .color-btn { aspect-ratio: 1; border-radius: 50%; border: 2.5px solid white; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .color-btn:hover { transform: scale(1.15); }

        .weather-grid { display: flex; justify-content: space-around; margin-bottom: 25px; background: rgba(255,255,255,0.4); padding: 10px; border-radius: 20px; }
        .weather-btn { background: none; border: none; font-size: 1.6rem; cursor: pointer; transition: 0.2s; opacity: 0.3; filter: grayscale(1); }
        .weather-btn.selected { opacity: 1; filter: grayscale(0); transform: scale(1.2); }

        textarea { width: 100%; height: 130px; padding: 18px; border-radius: 20px; border: 1px solid var(--border); background: rgba(255,255,255,0.7); font-family: inherit; font-size: 0.95rem; margin-bottom: 15px; outline: none; resize: none; line-height: 1.6; color: var(--ink); }

        .insight-box { background: rgba(255,255,255,0.9); border-radius: 22px; padding: 22px; font-size: 0.92rem; line-height: 2.0; border: 1px solid var(--border); min-height: 120px; }
        .answer-highlight { display: block; margin-top: 1.5rem; font-family: 'Shippori Mincho', serif; font-size: 1.05rem; font-weight: 700; color: var(--accent); text-align: center; border-top: 1px solid var(--border); padding-top: 1.5rem; }

        .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .cal-day { aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; background: rgba(255,255,255,0.5); cursor: pointer; border: 1px solid rgba(255,255,255,0.8); }
        .cal-dot-container { display: flex; gap: 3px; margin-top: 4px; }
        .cal-dot { width: 7px; height: 7px; border-radius: 50%; border: 1px solid white; }

        .btn-primary { width: 100%; padding: 16px; border-radius: 40px; border: none; background: linear-gradient(135deg, #a8c69f 0%, #c9a97a 100%); color: white; cursor: pointer; font-family: inherit; font-size: 1rem; font-weight: 700; box-shadow: 0 6px 20px rgba(168,198,159,0.3); transition: 0.3s; }
        .btn-ghost { width: 100%; padding: 12px; border-radius: 40px; border: 1.5px solid var(--border); background: transparent; color: var(--ink-light); cursor: pointer; margin-top: 10px; font-size: 0.85rem; }

        .popup-overlay { position: fixed; inset: 0; background: rgba(93,80,69,0.4); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 24px; }
        .popup-overlay.open { display: flex; }
        .popup-card { background: white; border-radius: 32px; padding: 30px; width: 100%; max-width: 420px; }

        .fadein { animation: fadein 0.6s cubic-bezier(0.22, 1, 0.36, 1) both; }
        @keyframes fadein { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app">
    <div class="header fadein">
        <div class="header-logo">ココイロ</div>
        <div class="header-sub">感情の輪郭を、色でなぞる。</div>
    </div>

    <div id="step1" class="step active fadein">
        <div class="card">
            <div class="step-label">Step 1</div>
            <div class="title-m">今のあなたの心は<br>何色をしていますか？</div>
            <div class="color-grid" id="gridNow"></div>
        </div>
        <div class="card">
            <div id="calTitle" style="font-size:0.9rem; margin-bottom:12px; text-align:center; font-weight:700;"></div>
            <div class="cal-days" id="calDays"></div>
        </div>
    </div>

    <div id="step2" class="step fadein">
        <div class="card">
            <div class="step-label">Step 2</div>
            <div class="title-m">明日のあなたは<br>どんな色でいたいですか？</div>
            <div class="color-grid" id="gridFuture"></div>
            <button class="btn-ghost" onclick="showStep('step1')">選び直す</button>
        </div>
    </div>

    <div id="step3" class="step fadein">
        <div class="card">
            <div class="step-label">Step 3</div>
            <div class="title-m" id="randomQuestion"></div>
            <div class="weather-grid" id="weatherGrid">
                <button class="weather-btn" onclick="selectWeather('☀️')">☀️</button>
                <button class="weather-btn" onclick="selectWeather('☁️')">☁️</button>
                <button class="weather-btn" onclick="selectWeather('☔️')">☔️</button>
                <button class="weather-btn" onclick="selectWeather('⚡️')">⚡️</button>
                <button class="weather-btn" onclick="selectWeather('🌈')">🌈</button>
            </div>
            <textarea id="memoArea" placeholder="浮かんできた言葉を、断片でも、叫びでも。自由においてください。"></textarea>
            <button class="btn-primary" onclick="goToResult()">感情の輪郭を、色でなぞる ✦</button>
            <button class="btn-ghost" onclick="showStep('step2')">戻る</button>
        </div>
    </div>

    <div id="step4" class="step fadein">
        <div class="card">
            <div class="step-label">Insight</div>
            <div id="insightBox" class="insight-box"></div>
            <button class="btn-primary" style="margin-top:20px;" onclick="saveRecord()">この心の記録を保存する</button>
            <button class="btn-ghost" onclick="showStep('step1')">やり直す</button>
        </div>
    </div>
</div>

<div class="popup-overlay" id="popupOverlay" onclick="if(event.target==this)this.classList.remove('open')">
    <div class="popup-card">
        <div id="popDate" style="font-size:0.8rem; color:var(--ink-light); margin-bottom:12px; font-weight:700;"></div>
        <div id="popColors" style="display:flex; gap:12px; align-items:center; margin-bottom:20px;"></div>
        <div id="popInsight" style="font-size:0.92rem; line-height:2; color:var(--ink); margin-bottom:20px; padding:18px; background:#f9f7f2; border-radius:18px;"></div>
        <div id="popMemo" style="font-size:0.85rem; color:var(--ink-light); border-left:4px solid var(--accent); padding-left:14px;"></div>
        <button class="btn-ghost" style="width:100%; margin-top:20px;" onclick="document.getElementById('popupOverlay').classList.remove('open')">閉じる</button>
    </div>
</div>

<script>
    const COLORS = [
        { code:'#E85C5C', name:'ルビーレッド', q:'その熱は、誰を温めるためのもの？' },
        { code:'#F39C12', name:'サンセット', q:'沈んでいく光のあとに、何を想う？' },
        { code:'#F1C40F', name:'ひまわり', q:'眩しすぎて、目を逸らしたくなったことは？' },
        { code:'#A2D149', name:'若草', q:'踏まれても、そこに居続ける理由は？' },
        { code:'#2ECC71', name:'エメラルド', q:'守りたいのは、場所？それとも自分？' },
        { code:'#1ABC9C', name:'ミント', q:'その透明感の下に、何を隠している？' },
        { code:'#3498DB', name:'スカイ', q:'どこまでも広い空は、自由？それとも孤独？' },
        { code:'#2980B9', name:'マリーン', q:'深い海の底に、沈めておきたいものは？' },
        { code:'#9B59B6', name:'アメジスト', q:'高貴さと、傷つきやすさ。どちらが本当？' },
        { code:'#8E44AD', name:'プラム', q:'熟しすぎた果実のように、揺れているものは？' },
        { code:'#E87AB0', name:'コスモス', q:'風に吹かれるまま、どこへ辿り着きたい？' },
        { code:'#D35400', name:'テラコッタ', q:'固く閉ざした土の中に、何が眠っている？' },
        { code:'#BDC3C7', name:'ミスト', q:'霧が晴れたとき、最初に見たくないものは？' },
        { code:'#7F8C8D', name:'ストーン', q:'動かない石のように、貫き通したいことは？' },
        { code:'#2C3E50', name:'ミッドナイト', q:'誰もいない夜にだけ、許せる自分は？' },
        { code:'#E67E22', name:'キャロット', q:'親しみやすさの裏にある、本当の距離感は？' },
        { code:'#ECF0F1', name:'クラウド', q:'形を変え続ける雲のように、捨て去りたい執着は？' },
        { code:'#FAD7A0', name:'アプリコット', q:'甘くて優しい記憶の、一番奥にある痛みは？' },
        { code:'#D5F5E3', name:'ペールグリーン', q:'呼吸を整えるとき、思い出す風景は？' },
        { code:'#AED6F1', name:'アイスブルー', q:'凍てついた心の底で、まだ脈打っているものは？' },
        { code:'#D2B4DE', name:'ラベンダー', q:'香りが消えたあとに残る、確かな手触りは？' },
        { code:'#F5B7B1', name:'コーラル', q:'波に揺られながら、守り抜きたい命の欠片は？' },
        { code:'#A93226', name:'ワイン', pos:'熟成', q:'長い時間をかけて、ようやく許せたことは？' },
        { code:'#17202A', name:'オブシディアン', q:'その深い黒は、拒絶？それとも休息？' }
    ];

    let currentEntry = { now: null, future: null, weather: '☀️', memo: '', insight: '' };
    const today = new Date();

    function init() {
        renderColorGrid('gridNow', (c) => { currentEntry.now = c; showStep('step2'); });
        renderColorGrid('gridFuture', (c) => { 
            currentEntry.future = c; 
            const baseQs = ["なぜ、その色を選びましたか？", "その色とあなたを結びつける「思い出」は何ですか？", "その色を見るとき、あなたの心はどう反応しましたか？"];
            const colorQ = currentEntry.now.q;
            const finalQs = [...baseQs, colorQ];
            document.getElementById('randomQuestion').innerText = finalQs[Math.floor(Math.random() * finalQs.length)];
            showStep('step3'); 
        });
        renderCalendar();
    }

    function renderColorGrid(id, callback) {
        const grid = document.getElementById(id);
        grid.innerHTML = '';
        COLORS.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'color-btn';
            btn.style.background = c.code;
            btn.onclick = () => callback(c);
            grid.appendChild(btn);
        });
    }

    function selectWeather(w) {
        currentEntry.weather = w;
        document.querySelectorAll('.weather-btn').forEach(btn => btn.classList.toggle('selected', btn.innerText === w));
    }

    function showStep(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function goToResult() {
        const memo = document.getElementById('memoArea').value;
        currentEntry.memo = memo;
        showStep('step4');

        const phrase = memo.length > 5 ? `あなたが紡いだ「${memo.substring(0, 12)}${memo.length > 12 ? '...' : ''}」という言葉。` : "";
        const fullText = `${phrase}「${currentEntry.now.name}」という今の質感と、「${currentEntry.future.name}」という明日の願い。それらすべてが、今のあなたを描くパッチワークの模様です。誰かが決めた意味に染まる必要はありません。ただその輪郭を、静かに見つめていてください。<span class="answer-highlight">答えは外側ではなく、あなたの中にあります。</span>`;
        
        typeWriter(document.getElementById('insightBox'), fullText);
        currentEntry.insight = fullText;
    }

    function typeWriter(el, text) {
        el.innerHTML = "";
        let i = 0;
        const speed = 40;
        function type() {
            if (i < text.length) {
                if (text.substring(i, i + 1) === '<') {
                    const tagEnd = text.indexOf('>', i) + 1;
                    el.innerHTML += text.substring(i, tagEnd);
                    i = tagEnd;
                } else {
                    el.innerHTML += text.charAt(i);
                    i++;
                }
                setTimeout(type, speed);
            }
        }
        type();
    }

    function saveRecord() {
        const key = `cocoiro_${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
        localStorage.setItem(key, JSON.stringify(currentEntry));
        location.reload();
    }

    function renderCalendar() {
        const container = document.getElementById('calDays');
        const title = document.getElementById('calTitle');
        title.innerText = `${today.getFullYear()}年 ${today.getMonth() + 1}月`;
        const lastDate = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
        const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).getDay();
        container.innerHTML = '';
        for (let i = 0; i < firstDay; i++) container.appendChild(document.createElement('div'));
        for (let d = 1; d <= lastDate; d++) {
            const dayEl = document.createElement('div');
            dayEl.className = 'cal-day';
            dayEl.innerText = d;
            const key = `cocoiro_${today.getFullYear()}-${today.getMonth() + 1}-${d}`;
            const record = JSON.parse(localStorage.getItem(key));
            if (record) {
                const dots = document.createElement('div');
                dots.className = 'cal-dot-container';
                const d1 = document.createElement('div'); d1.className='cal-dot'; d1.style.background=record.now.code;
                const d2 = document.createElement('div'); d2.className='cal-dot'; d2.style.background=record.future.code;
                dots.appendChild(d1); dots.appendChild(d2);
                dayEl.appendChild(dots);
                dayEl.onclick = () => showPopup(record, d);
            }
            container.appendChild(dayEl);
        }
    }

    function showPopup(rec, d) {
        document.getElementById('popDate').innerText = `${today.getFullYear()}年${today.getMonth()+1}月${d}日`;
        document.getElementById('popColors').innerHTML = `<div class="cal-dot" style="width:18px; height:18px; background:${rec.now.code}"></div><span>→</span><div class="cal-dot" style="width:18px; height:18px; background:${rec.future.code}"></div> <span style="font-size:1.1rem; margin-left:10px;">${rec.weather}</span>`;
        document.getElementById('popInsight').innerHTML = rec.insight;
        document.getElementById('popMemo').innerText = rec.memo || "メモなし";
        document.getElementById('popupOverlay').classList.add('open');
    }

    init();
    selectWeather('☀️');
</script>

</body>
</html>
