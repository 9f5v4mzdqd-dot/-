<script>
    const COLORS = [
        { code:'#E60012', name:'レッド', view:'情熱の裏にある、燃え尽きそうな静寂' },
        { code:'#F39800', name:'オレンジ', view:'温もりの輪郭を、誰かと共有したくなる感覚' },
        { code:'#FFF100', name:'イエロー', view:'眩しさの陰に隠した、誰にも見せない震え' },
        { code:'#8FC31F', name:'ライトグリーン', view:'未熟さという名の、どこへでも行ける自由' },
        { code:'#009944', name:'グリーン', view:'揺るがない調和の中に潜む、変化への渇望' },
        { code:'#00A0E9', name:'シアン', view:'澄み切った水底で、呼吸を整える時間' },
        { code:'#0068B7', name:'ブルー', view:'高く、どこまでも突き抜けるような孤独' },
        { code:'#1D2088', name:'インディゴ', view:'すべてを飲み込み、記憶を沈める深い慈しみ' },
        { code:'#920783', name:'パープル', view:'境界線の上で、二つの自分を抱きしめる夜' },
        { code:'#E4007F', name:'マゼンタ', view:'秘密を抱えたまま、ゆっくりと熟成していく心' },
        { code:'#EA5550', name:'スカーレット', view:'繊細なままでいることを、自分に許す勇気' },
        { code:'#81511C', name:'ブラウン', view:'大地に根を張り、剥き出しの自分を肯定する力' },
        { code:'#A0A0A0', name:'グレー', view:'境界が曖昧になる、休息という名の避難所' },
        { code:'#595857', name:'ダークグレー', view:'摩耗してもなお、そこにある確かな意志' },
        { code:'#000000', name:'ブラック', view:'闇の中でだけ、鮮明に浮かび上がる本当の形' },
        { code:'#FFFFFF', name:'ホワイト', view:'執着を手放し、ただ流れていくことの軽やかさ' },
        { code:'#F6AD3C', name:'アンバー', view:'守られた場所で、もう一度自分を信じる予兆' },
        { code:'#004D40', name:'ティール', view:'強張った心に、新しい風を通すための隙間' },
        { code:'#C5E1A5', name:'ペールライム', view:'静かな変化を待ちわびる、芽生えの気配' },
        { code:'#81D4FA', name:'スカイブルー', view:'冷たさの果てに、純化された透明な思考' },
        { code:'#B39DDB', name:'ソフトパープル', view:'祈りのように、静かに漂う感情の残響' },
        { code:'#FFAB91', name:'サーモン', view:'波打つ命の、一番柔らかい場所にある輝き' },
        { code:'#722F37', name:'ワイン', view:'痛みを越えて、深みへと変わった確信' },
        { code:'#212121', name:'オブシディアン', view:'拒絶ではなく、自分を守るための絶対的な壁' }
    ];

    let currentEntry = {
        now: null,
        nowReason: '',
        future: null,
        futureReason: '',
        weather: '☀️',
        memo: '',
        insight: ''
    };

    function getToday() {
        return new Date();
    }

    function dateKey(d) {
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `cocoiro_${yyyy}-${mm}-${dd}`;
    }

    function init() {
        renderColorGrid('gridNow', (c) => {
            currentEntry.now = c;
            // バッジ更新
            document.getElementById('nowBadgeDot').style.background = c.code;
            document.getElementById('nowBadgeName').textContent = c.name;
            showStep('step2');
        });
        renderColorGrid('gridFuture', (c) => {
            currentEntry.future = c;
            // バッジ更新
            document.getElementById('futureBadgeDot').style.background = c.code;
            document.getElementById('futureBadgeName').textContent = c.name;
            // ランダム質問をStep5用にセット
            const qs = [
                "今日、あなたの心に触れたものは何ですか？",
                "その色の変化の間に、どんな自分がいますか？",
                "この気持ちに、もし名前をつけるとしたら？"
            ];
            document.getElementById('randomQuestion').textContent = qs[Math.floor(Math.random() * qs.length)];
            showStep('step4');
        });
        renderCalendar();
        selectWeather('☀️');
    }

    function renderColorGrid(id, callback) {
        const grid = document.getElementById(id);
        grid.innerHTML = '';
        COLORS.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'color-btn';
            btn.style.background = c.code;
            btn.title = c.name;
            btn.onclick = () => {
                grid.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                setTimeout(() => callback(c), 120);
            };
            grid.appendChild(btn);
        });
    }

    function selectWeather(w) {
        currentEntry.weather = w;
        document.querySelectorAll('.weather-btn').forEach(btn => {
            btn.classList.toggle('selected', btn.textContent.trim() === w);
        });
    }

    function showStep(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function goToStep3() {
        currentEntry.nowReason = document.getElementById('nowReasonArea').value;
        showStep('step3');
    }

    function goToStep5() {
        currentEntry.futureReason = document.getElementById('futureReasonArea').value;
        showStep('step5');
    }

    // 二つの理由を自然に統合したリフレクション生成
    function generateReflection(entry) {
        const { now, nowReason, future, futureReason, memo } = entry;
        const nowR = nowReason.trim();
        const futureR = futureReason.trim();
        const memoR = memo.trim();

        let lines = [];

        // 今の色について
        if (nowR.length > 0) {
            lines.push(
                `「${now.name}」を選んだあなたは、<br>` +
                `${nowR.length < 30 ? `"${nowR}"` : nowR.slice(0, 28) + '……'}という感覚の中にいます。<br>` +
                `その場所は、${now.view}。`
            );
        } else {
            lines.push(`今の「${now.name}」の中に佇むあなた。その色は、${now.view}として静かに息をしています。`);
        }

        lines.push('');

        // なりたい色について
        if (futureR.length > 0) {
            lines.push(
                `そこから「${future.name}」へ向かいたいのは、<br>` +
                `${futureR.length < 30 ? `"${futureR}"` : futureR.slice(0, 28) + '……'}という気持ちがあるから。<br>` +
                `その願いの先には、${future.view}が待っています。`
            );
        } else {
            lines.push(`それでも「${future.name}」へ向かおうとする意志。その先には、${future.view}が広がっています。`);
        }

        // メモがあれば添える
        if (memoR.length > 0) {
            lines.push('');
            const word = memoR.split(/[、。！？\s\n]+/).filter(w => w.length > 0)[0] || memoR.slice(0, 10);
            lines.push(`「${word}」という言葉が、今日のあなたの輪郭を、静かに縁取っています。`);
        }

        lines.push('');
        lines.push(`二つの色の間にある距離は、あなたが今まさに生きている場所です。<span class="answer-highlight">その揺らぎのすべてが、あなたの答えです。</span>`);

        return lines.join('<br>');
    }

    async function goToResult() {
        currentEntry.memo = document.getElementById('memoArea').value;
        showStep('stepResult');

        const reflectionHTML = generateReflection(currentEntry);
        currentEntry.insight = reflectionHTML;

        typeWriter(document.getElementById('insightBox'), reflectionHTML);
    }

    function typeWriter(el, html) {
        el.innerHTML = '';
        let i = 0;
        function type() {
            if (i >= html.length) return;
            if (html[i] === '<') {
                const end = html.indexOf('>', i);
                if (end !== -1) {
                    el.innerHTML += html.slice(i, end + 1);
                    i = end + 1;
                } else {
                    el.innerHTML += html[i++];
                }
            } else {
                el.innerHTML += html[i++];
            }
            setTimeout(type, 28);
        }
        type();
    }

    function saveRecord() {
        const today = getToday();
        const key = dateKey(today);
        const existing = localStorage.getItem(key);

        const doSave = () => {
            try {
                localStorage.setItem(key, JSON.stringify(currentEntry));
                showToast('記録を保存しました ✦');
                setTimeout(() => { renderCalendar(); showStep('step1'); }, 1200);
            } catch(e) {
                showToast('保存に失敗しました。空き容量を確認してください。');
            }
        };

        if (existing) {
            if (confirm('今日の記録はすでに存在します。上書きしますか？')) {
                doSave();
            }
        } else {
            doSave();
        }
    }

    function showToast(msg) {
        const t = document.getElementById('saveToast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
    }

    function renderCalendar() {
        const today = getToday();
        const container = document.getElementById('calDays');
        const title = document.getElementById('calTitle');
        title.textContent = `${today.getFullYear()}年 ${today.getMonth() + 1}月`;
        const lastDate = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
        const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).getDay();
        container.innerHTML = '';
        for (let i = 0; i < firstDay; i++) {
            const blank = document.createElement('div');
            container.appendChild(blank);
        }
        for (let d = 1; d <= lastDate; d++) {
            const dayEl = document.createElement('div');
            dayEl.className = 'cal-day';
            dayEl.textContent = d;
            const fakeToday = new Date(today.getFullYear(), today.getMonth(), d);
            const key = dateKey(fakeToday);
            let record = null;
            try { record = JSON.parse(localStorage.getItem(key)); } catch(e) {}
            if (record && record.now && record.future) {
                const dots = document.createElement('div');
                dots.className = 'cal-dot-container';
                const d1 = document.createElement('div'); d1.className = 'cal-dot'; d1.style.background = record.now.code;
                const d2 = document.createElement('div'); d2.className = 'cal-dot'; d2.style.background = record.future.code;
                dots.appendChild(d1); dots.appendChild(d2);
                dayEl.appendChild(dots);
                dayEl.classList.add('has-record');
                dayEl.onclick = () => showPopup(record, d, today);
            }
            container.appendChild(dayEl);
        }
    }

    function showPopup(rec, d, today) {
        document.getElementById('popDate').textContent = `${today.getFullYear()}年${today.getMonth()+1}月${d}日`;
        document.getElementById('popColors').innerHTML =
            `<div class="cal-dot" style="width:18px;height:18px;background:${rec.now.code}"></div>` +
            `<span>→</span>` +
            `<div class="cal-dot" style="width:18px;height:18px;background:${rec.future.code}"></div>` +
            `<span style="font-size:1.1rem;margin-left:10px;">${rec.weather || ''}</span>`;
        document.getElementById('popInsight').innerHTML = rec.insight || '';
        const memoLines = [rec.memo, rec.nowReason, rec.futureReason].filter(Boolean).join(' / ');
        document.getElementById('popMemo').textContent = memoLines || 'メモなし';
        document.getElementById('popupOverlay').classList.add('open');
    }

    init();
</script>

</body>
</html>
