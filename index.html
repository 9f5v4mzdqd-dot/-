<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自己対話カラーセラピー</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">

<style>

/* 🌿 背景（やわらかグラデーション） */
body {
    font-family: 'Zen Maru Gothic', sans-serif;
    margin: 0;
    padding: 20px;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: flex-start;

    background: linear-gradient(
        135deg,
        #f8f6f2 0%,
        #f1efe9 40%,
        #e8f0ee 70%,
        #f6f3f8 100%
    );

    color: #5d5045;
}

/* 🌿 メインカード */
.container {
    width: 100%;
    max-width: 520px;

    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);

    padding: 30px;
    border-radius: 28px;

    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* 🌿 タイトル */
h1 {
    font-size: 1.2rem;
    text-align: center;
    margin-bottom: 25px;

    color: #7a6a58;
    letter-spacing: 0.08em;
}

/* 🌿 カラーボタン */
.color-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 14px;
    margin-bottom: 30px;
}

.color-btn {
    aspect-ratio: 1;
    border-radius: 50%;
    border: 3px solid white;

    cursor: pointer;

    box-shadow: 0 6px 14px rgba(0,0,0,0.1);
    transition: 0.25s;
}

.color-btn:hover {
    transform: scale(1.1);
}

/* 🌿 質問カード */
.question-box {
    background: rgba(255,255,255,0.7);
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 20px;

    border: 1px solid #eee;

    box-shadow: inset 0 0 10px rgba(0,0,0,0.03);
}

.question-box p {
    font-size: 0.9rem;
    margin-bottom: 10px;
    color: #9a8570;
    font-weight: bold;
}

/* 🌿 テキストエリア */
textarea {
    width: 100%;
    height: 120px;
    padding: 15px;

    border-radius: 16px;
    border: 1px solid #e8e3dc;

    font-family: inherit;
    font-size: 0.95rem;

    outline: none;
    resize: none;

    background: #ffffff;
}

/* 🌿 ボタン */
.primary-btn {
    width: 100%;
    padding: 14px;

    border-radius: 30px;
    border: none;

    font-size: 1rem;

    background: linear-gradient(
        135deg,
        #a8d5c2,
        #cdb4db
    );

    color: #444;

    cursor: pointer;

    box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    margin-top: 10px;

    transition: 0.2s;
}

.primary-btn:hover {
    opacity: 0.9;
}

/* 🌿 カレンダー */
.calendar-container {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid #eee;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
}

.cal-day {
    font-size: 0.7rem;
    padding: 6px;

    background: rgba(255,255,255,0.6);

    border-radius: 10px;

    min-height: 45px;
    position: relative;

    backdrop-filter: blur(5px);
}

.cal-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;

    margin: 4px auto 0;
    display: block;

    border: 2px solid white;
}

/* 🌿 結果 */
.meaning-card {
    line-height: 1.8;
}

.tag {
    display: inline-block;
    padding: 4px 10px;

    border-radius: 12px;
    font-size: 0.8rem;
    margin-bottom: 5px;
}

.tag-pos {
    background: #e8f5ec;
    color: #6b8f71;
}

.tag-neg {
    background: #fcebea;
    color: #c46a6a;
}

</style>
</head>

<body>

<div class="container">
    <h1>今のあなたを色に例えるなら？</h1>
    <div class="color-grid" id="grid"></div>
</div>

<script>
const colors = [
    { code:'#FF6B6B' },
    { code:'#74B9FF' },
    { code:'#FFE66D' },
    { code:'#86E3CE' },
    { code:'#FFBE76' },
    { code:'#D6A2E8' },
    { code:'#FFB8B8' },
    { code:'#81ECEC' }
];

const grid = document.getElementById('grid');

colors.forEach(c => {
    const b = document.createElement('div');
    b.className = 'color-btn';
    b.style.backgroundColor = c.code;
    grid.appendChild(b);
});
</script>

</body>
</html>
